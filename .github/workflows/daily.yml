name: Daily X post suggestions to LINE

on:
  schedule:
    # 毎日 JST 07:00 = UTC 22:00 (前日)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts and Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install -r requirements.txt

      - name: Generate posts and images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_posts.py

      - name: Commit and push state + images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json images/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: $(date -u +%Y-%m-%d) daily generation"
            for i in 1 2 3 4; do
              git push origin HEAD:${{ github.ref_name }} && break
              echo "push failed, retrying ($i)..."
              sleep $((2**i))
            done
          fi

      - name: Send to LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}
        run: python send_to_line.py
