name: Generate Instagram Reel video

on:
  workflow_dispatch:
    inputs:
      post_text:
        description: "動画にする投稿本文(LINEで届いた案をそのまま貼る)"
        required: true
        type: string
      speaker:
        description: "VOICEVOX話者ID (3=ずんだもん, 2=四国めたん, 8=春日部つむぎ)"
        required: false
        default: "3"
        type: string

jobs:
  video:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
        ports:
          - 50021:50021

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fonts and Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk ffmpeg
          pip install -r requirements.txt

      - name: Wait for VOICEVOX engine
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:50021/version; then
              echo "VOICEVOX ready"; break
            fi
            echo "waiting for VOICEVOX ($i)..."; sleep 3
          done

      - name: Generate reel
        env:
          POST_TEXT: ${{ inputs.post_text }}
          VOICEVOX_SPEAKER: ${{ inputs.speaker }}
          VOICEVOX_URL: http://localhost:50021
        run: python generate_video.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: reel-mp4
          path: out/reel.mp4
          retention-days: 7
