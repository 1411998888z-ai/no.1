name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "clipboard-manager/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみ実行（進行中は完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 公開サイトを組み立てる:
  #   - docs/            → サイトのルート（Nova Prime サービスページ・カリキュラム設計シート・admin）
  #   - clipboard-manager → /copypad/ 以下（コピペ管理ツール Copypad）
  # ※初回のみ、Settings → Pages で Source を「GitHub Actions」に設定
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          # 元のサイト（Nova Prime）をルートへ
          cp -r docs/. _site/
          # Copypad を /copypad/ へ
          mkdir -p _site/copypad
          cp -r clipboard-manager/. _site/copypad/
          # 静的配信（Jekyll 無効化）
          touch _site/.nojekyll
          echo "----- assembled _site -----"
          find _site -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
