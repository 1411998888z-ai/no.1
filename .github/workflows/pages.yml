name: Deploy Copypad to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "clipboard-manager/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみ実行（進行中は完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true で Pages 未設定でも自動で有効化（ソース=GitHub Actions）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # clipboard-manager をサイトのルートとして公開
          path: clipboard-manager

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
