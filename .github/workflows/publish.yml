name: Publish approved post

on:
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      job_id:
        description: "pending/<job_id>.json の job_id"
        required: true
      candidate_id:
        description: "投稿する候補ID（1〜3）"
        required: true
        default: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Resolve inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "job_id=${{ github.event.client_payload.job_id }}" >> $GITHUB_OUTPUT
            echo "candidate_id=${{ github.event.client_payload.candidate_id }}" >> $GITHUB_OUTPUT
          else
            echo "job_id=${{ inputs.job_id }}" >> $GITHUB_OUTPUT
            echo "candidate_id=${{ inputs.candidate_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Pull latest pending state
        run: git pull --ff-only

      - name: Publish to Threads
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          JOB_ID: ${{ steps.vars.outputs.job_id }}
          CANDIDATE_ID: ${{ steps.vars.outputs.candidate_id }}
        run: python src/publish.py

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pending/ posted/
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore: archive posted job ${{ steps.vars.outputs.job_id }}"
            git push
          fi
